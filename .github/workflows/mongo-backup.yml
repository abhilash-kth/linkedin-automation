name: MongoDB Backup

on:
  schedule:
    # Every day at 8:30 PM UTC = 2:00 AM IST
    - cron: '30 20 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Backup MongoDB
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: bun scripts/gh-mongo-backup.js

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mongodb-backup-${{ github.run_id }}
          path: ./backups/
          retention-days: 30